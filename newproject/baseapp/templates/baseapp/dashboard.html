<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/auth_style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .dashboard-container {
            max-width: 800px;
            margin: 40px auto;
            width: 100%;
            padding: 0 20px;
        }
        
        .user-details {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .detail-value {
            color: var(--text-primary);
            font-weight: 600;
        }
        
        .role-badge {
            background: var(--primary-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            text-transform: capitalize;
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.3);
        }
        
        .role-badge.admin { background: #ef4444; box-shadow: 0 2px 10px rgba(239, 68, 68, 0.3); }
        .role-badge.jury { background: var(--accent-color); box-shadow: 0 2px 10px rgba(139, 92, 246, 0.3); }
    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>

    <div class="dashboard-container">
        <div class="glass-panel">
            <div class="form-header">
                <h2>Welcome to your Dashboard</h2>
                <p class="subtitle">You have successfully authenticated.</p>
            </div>
            
            <div class="user-details">
                <div class="detail-row">
                    <span class="detail-label">Username</span>
                    <span class="detail-value">{{ user.username }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Email Address</span>
                    <span class="detail-value">{{ user.email }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Account Role</span>
                    <span class="detail-value">
                        <span class="role-badge {{ user.role }}">{{ user.role }}</span>
                    </span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Date Joined</span>
                    <span class="detail-value">{{ user.date_joined|date:"M d, Y" }}</span>
                </div>
            </div>
            
        </div>
    </div>
</body>
</html>
