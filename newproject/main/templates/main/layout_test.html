{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'main/css/main.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>{% block title %}{% endblock %}</title>
</head>

<body>
    <aside>
        <img src="{% static 'main/img/1.jpg' %}" alt ="">
        <span class="logo">We</span>
        <h2 style = "margin-top: 225px"> Навігація </h2>
        <ul>
            <a href = "{% url "home" %}">
                <li><i class="fa-solid fa-house"></i> Головна </li>
            </a>
            <a href = "{% url "about" %}">
                <li><i class="fa-solid fa-circle-info"></i> Про нас </li>
            </a>
            <a href = "{% url "news_home" %}">
                <li><i class="fa-solid fa-newspaper"></i> Новини </li>
            </a>
        </ul>
    </aside>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
